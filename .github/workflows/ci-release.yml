name: CI and Release

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Typecheck, Prettier, Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

      - name: Run Prettier check
        run: bun run format:check

      - name: Build app bundle
        run: bun run build

  release-build:
    name: Build release binary (${{ matrix.target }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: macos-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build compiled executable
        run: bun build --compile --root . ./bin/xdraw.ts --outfile dist/xdraw

      - name: Package release artifact
        run: |
          mkdir -p dist/release
          tar -C dist -czf "dist/release/xdraw-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" xdraw

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: xdraw-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/release/xdraw-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release-publish:
    name: Publish GitHub release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
